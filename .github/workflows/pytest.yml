name: pytest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: uv sync
    - name: Run tests
      env:
        TEST_HANDLE: ${{ secrets.HANDLE }}
        TEST_APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      run: uv run pytest
    - name: Lint with ruff
      run: uv run ruff check .
